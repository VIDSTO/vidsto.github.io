<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 80" width="280" height="80">
  <defs>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7C3AED"/>
      <stop offset="100%" style="stop-color:#A855F7"/>
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7C3AED;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#A855F7;stop-opacity:0.08"/>
    </linearGradient>
  </defs>

  <!-- Dark background pill -->
  <rect x="0" y="8" width="280" height="64" rx="18" fill="#1E1830"/>

  <!-- Play icon box -->
  <rect x="12" y="16" width="48" height="48" rx="14" fill="url(#accentGrad)"/>
  <!-- Play triangle -->
  <polygon points="28,28 28,52 50,40" fill="white"/>

  <!-- Vid (purple) -->
  <text x="72" y="56" font-family="'Syne', 'Arial Black', sans-serif" font-weight="800" font-size="38" fill="url(#accentGrad)" letter-spacing="-1">Vid</text>

  <!-- sto (white) -->
  <text x="148" y="56" font-family="'Syne', 'Arial Black', sans-serif" font-weight="800" font-size="38" fill="#F3F0FF" letter-spacing="-1">sto</text>

  <!-- Dot accent -->
  <circle cx="262" cy="24" r="6" fill="#7C3AED" opacity="0.8"/>
  <circle cx="274" cy="36" r="4" fill="#A855F7" opacity="0.6"/>
</svg>
